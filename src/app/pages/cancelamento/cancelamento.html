<h1>

Cancelamento NF-e

</h1>

<hr>

<div>

<label>

UUID

</label>

<input

type="text"

[(ngModel)]="uuid">

</div>

<br>

<div>

<label>

Justificativa

</label>

<textarea

rows="5"

cols="50"

[(ngModel)]="justificativa">

</textarea>

</div>

<br>

<button

(click)="cancelar()">

Cancelar NF-e

</button>

<hr>

<div *ngIf="resposta">

<h2>

Resultado

</h2>

<p>

UUID:

{{resposta.uuid}}

</p>

<p>

Status:

{{resposta.status}}

</p>

<p>

Justificativa:

{{resposta.justificativa}}

</p>

<p>

Data Cancelamento:

{{resposta.dataCancelamento}}

</p>

</div>
