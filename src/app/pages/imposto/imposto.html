<h1>

Classe de Imposto

</h1>

<hr>

<input

placeholder="Referência"

[(ngModel)]="request.referencia">

<input

placeholder="Descrição"

[(ngModel)]="request.descricao">

<hr>

<h2>

ICMS

</h2>

<input

placeholder="Tipo Tributação"

[(ngModel)]="request.icms[0].tipoTributacao">

<input

placeholder="Cenário"

[(ngModel)]="request.icms[0].cenario">

<input

placeholder="Tipo Pessoa"

[(ngModel)]="request.icms[0].tipoPessoa">

<input

placeholder="CFOP"

[(ngModel)]="request.icms[0].codigoCfop">

<input

placeholder="Situação Tributária"

[(ngModel)]="request.icms[0].situacaoTriburaria">

<hr>

<h2>

IPI

</h2>

<input

placeholder="Cenário"

[(ngModel)]="request.ipi[0].cenario">

<input

placeholder="Tipo Pessoa"

[(ngModel)]="request.ipi[0].tipoPessoa">

<input

placeholder="Situação Tributária"

[(ngModel)]="request.ipi[0].situacaoTributaria">

<input

placeholder="Código Enquadramento"

[(ngModel)]="request.ipi[0].codigoEnquadramento">

<input

type="number"

placeholder="Alíquota"

[(ngModel)]="request.ipi[0].aliquota">

<hr>

<h2>

PIS

</h2>

<input

placeholder="Situação Tributária"

[(ngModel)]="request.pis[0].situacaoTributaria">

<input

type="number"

placeholder="Alíquota"

[(ngModel)]="request.pis[0].aliquota">

<hr>

<h2>

COFINS

</h2>

<input

placeholder="Situação Tributária"

[(ngModel)]="request.cofins[0].situacaoTributaria">

<input

type="number"

placeholder="Alíquota"

[(ngModel)]="request.cofins[0].aliquota">

<hr>

<textarea

rows="4"

placeholder="Informações Fisco"

[(ngModel)]="request.informacoesFisco">

</textarea>

<br><br>

<textarea

rows="4"

placeholder="Informações Complementares"

[(ngModel)]="request.informacoesComplementares">

</textarea>

<br><br>

<button

(click)="salvar()">

Salvar Classe Imposto

</button>

<hr>

<h2>

Classes Cadastradas

</h2>

<div *ngFor="let item of lista">

<p>

<strong>

{{item.referencia}}

</strong>

-

{{item.descricao}}

</p>

<p>

{{item.dataCriacao}}

</p>

<button

(click)="excluir(item.referencia)">

Excluir

</button>

<hr>

</div>
