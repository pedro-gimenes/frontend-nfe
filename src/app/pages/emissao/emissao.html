<h1>

Emissão NF-e

</h1>

<hr>

<h2>

Dados Gerais

</h2>

<input

placeholder="ID"

[(ngModel)]="request.id">

<input

placeholder="Operação"

type="number"

[(ngModel)]="request.operacao">

<input

placeholder="Natureza Operação"

[(ngModel)]="request.naturezaOperacao">

<input

placeholder="Finalidade"

type="number"

[(ngModel)]="request.finalidade">

<br>

<label>

Data Emissão

</label>

<input

type="datetime-local"

[(ngModel)]="request.dataEmissao">

<label>

Data Entrada/Saída

</label>

<input

type="datetime-local"

[(ngModel)]="request.dataEntradaSaida">

<hr>

<h2>

Cliente

</h2>

<input

placeholder="CPF/CNPJ"

[(ngModel)]="request.cliente.cpf">

<input

placeholder="Nome"

[(ngModel)]="request.cliente.nomeCompleto">

<input

placeholder="Email"

[(ngModel)]="request.cliente.email">

<input

placeholder="Telefone"

[(ngModel)]="request.cliente.telefone">

<input

placeholder="Endereço"

[(ngModel)]="request.cliente.endereco">

<input

placeholder="Número"

[(ngModel)]="request.cliente.numero">

<input

placeholder="Bairro"

[(ngModel)]="request.cliente.bairro">

<input

placeholder="Município"

[(ngModel)]="request.cliente.cidade">

<input

placeholder="UF"

[(ngModel)]="request.cliente.uf">

<input

placeholder="CEP"

[(ngModel)]="request.cliente.cep">

<hr>

<h2>

Produtos

</h2>

<div

*ngFor="let produto of request.produtos; let i = index"

class="produto">

<h3>

Produto {{i+1}}

</h3>

<input

placeholder="Código"

[(ngModel)]="produto.codigo">

<input

placeholder="Nome"

[(ngModel)]="produto.nome">

<input

placeholder="Quantidade"

type="number"

[(ngModel)]="produto.quantidade">

<input

placeholder="Unidade"

[(ngModel)]="produto.unidade">

<input

placeholder="Peso"

type="number"

[(ngModel)]="produto.peso">

<input

placeholder="Origem"

type="number"

[(ngModel)]="produto.origem">

<input

placeholder="Subtotal"

type="number"

[(ngModel)]="produto.subtotal">

<input

placeholder="Total"

type="number"

[(ngModel)]="produto.total">

<input

placeholder="Classe Imposto"

[(ngModel)]="produto.classeImposto">

</div>

<button

(click)="adicionarProduto()">

+ Adicionar Produto

</button>

<hr>

<h2>

Pedido

</h2>

<input

placeholder="Pagamento"

type="number"

[(ngModel)]="request.pedido.pagamento">

<input

placeholder="Presença"

type="number"

[(ngModel)]="request.pedido.presenca">

<input

placeholder="Modalidade Frete"

type="number"

[(ngModel)]="request.pedido.modalidadeFrete">

<input

placeholder="Frete"

type="number"

[(ngModel)]="request.pedido.frete">

<input

placeholder="Desconto"

type="number"

[(ngModel)]="request.pedido.desconto">

<input

placeholder="Total"

type="number"

[(ngModel)]="request.pedido.total">

<hr>

<label>

<input

type="checkbox"

[(ngModel)]="request.previaDanfe">

Prévia DANFE

</label>

<label>

<input

type="checkbox"

[(ngModel)]="request.assincrono">

Assíncrono

</label>

<br><br>

<button

(click)="emitir()">

Emitir NF-e

</button>

<hr>

<div *ngIf="resposta">

<h2>

Resultado

</h2>

<p>

UUID:

{{resposta.uuid}}

</p>

<p>

Status:

{{resposta.status}}

</p>

<p>

Motivo:

{{resposta.motivo}}

</p>

<p>

Número:

{{resposta.numeroNfe}}

</p>

<p>

Série:

{{resposta.serie}}

</p>

<p>

Chave:

{{resposta.chaveAcesso}}

</p>

</div>
