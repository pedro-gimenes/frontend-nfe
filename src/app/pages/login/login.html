<div class="container">

    <h1>

        Sistema NF-e

    </h1>

    <div>

        <label>

            Usuário

        </label>

        <input

        type="text"

        [(ngModel)]="username">

    </div>

    <br>

    <div>

        <label>

            Senha

        </label>

        <input

        type="password"

        [(ngModel)]="password">

    </div>

    <br>

    <button

    (click)="login()">

        Entrar

    </button>

</div>
