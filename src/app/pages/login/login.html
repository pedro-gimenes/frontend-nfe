<div class="login-container">

    <div class="login-card">

        <div class="logo">

        </div>

        <h1>

            Sistema NF-e

        </h1>

        <p class="subtitle">

            Emissão e gerenciamento de notas fiscais

        </p>

        <div class="form-group">

            <label>

                Usuário

            </label>

            <input

                type="text"

                [(ngModel)]="username"

                placeholder="Digite seu usuário">

        </div>

        <div class="form-group">

            <label>

                Senha

            </label>

            <input

                type="password"

                [(ngModel)]="password"

                placeholder="Digite sua senha">

        </div>

        <button

            class="btn-login"

            (click)="login()">

            Entrar

        </button>

    </div>

</div>
