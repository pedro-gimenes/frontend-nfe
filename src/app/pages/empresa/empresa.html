<h1>

Empresa Emissora

</h1>

<hr>

<input

placeholder="CNPJ"

[(ngModel)]="request.cnpj">

<input

placeholder="Razão Social"

[(ngModel)]="request.razaoSocial">

<input

placeholder="Nome Fantasia"

[(ngModel)]="request.nomeFantasia">

<input

placeholder="Inscrição Estadual"

[(ngModel)]="request.inscricaoEstadual">

<input

type="number"

placeholder="Regime Tributário"

[(ngModel)]="request.regimeTributario">

<input

placeholder="Email"

[(ngModel)]="request.email">

<input

placeholder="Telefone"

[(ngModel)]="request.telefone">

<input

placeholder="CEP"

[(ngModel)]="request.cep">

<input

placeholder="Endereço"

[(ngModel)]="request.endereco">

<input

placeholder="Número"

[(ngModel)]="request.numero">

<input

placeholder="Bairro"

[(ngModel)]="request.bairro">

<input

placeholder="Município"

[(ngModel)]="request.municipio">

<input

placeholder="UF"

[(ngModel)]="request.uf">

<br>

<button

(click)="salvar()">

Salvar Empresa

</button>

<hr>

<h2>

Empresas Cadastradas

</h2>

<div *ngFor="let empresa of lista">

<p>

<strong>

{{empresa.razaoSocial}}

</strong>

</p>

<p>

CNPJ:

{{empresa.cnpj}}

</p>

<p>

IE:

{{empresa.inscricaoEstadual}}

</p>

<p>

Município:

{{empresa.municipio}} / {{empresa.uf}}

</p>

<p>

Data Cadastro:

{{empresa.dataCriacao}}

</p>

<hr>

</div>
